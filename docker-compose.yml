services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orbion
      POSTGRES_USER: orbion
      POSTGRES_PASSWORD: orbion_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/migrations:ro
      - ./scripts/pg-init-dev.sh:/docker-entrypoint-initdb.d/pg-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbion -d orbion"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 10s

  orbion:
    build: .
    environment:
      ORBION_JWT_SECRET: ${ORBION_JWT_SECRET:-orbion-dev-secret}
      ORBION_ANTHROPIC_API_KEY: ${ORBION_ANTHROPIC_API_KEY:-}
      ORBION_POSTGRES__PASSWORD: ${ORBION_POSTGRES__PASSWORD:-orbion_dev}
      ORBION_POSTGRES__HOST: postgres
      ORBION_CONFIG_PATH: /app/orbion.json
    volumes:
      - ./orbion.json:/app/orbion.json:ro
      - ./repo:/app/repo
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: